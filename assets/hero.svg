<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1e1608"/>
      <stop offset="60%" stop-color="#0f0c06"/>
      <stop offset="100%" stop-color="#000"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" fill="url(#bg)"/>
  <rect width="1200" height="700" fill="url(#glow)"/>

  <!-- Subtle dot texture -->
  <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
    <circle cx="15" cy="15" r="0.8" fill="#c9a84c" opacity="0.07"/>
  </pattern>
  <rect width="1200" height="700" fill="url(#dots)"/>

  <!-- Top & bottom gold lines -->
  <line x1="0" y1="1" x2="1200" y2="1" stroke="#c9a84c" stroke-width="1" opacity="0.25"/>
  <line x1="0" y1="699" x2="1200" y2="699" stroke="#c9a84c" stroke-width="1" opacity="0.25"/>

  <!-- Frame border -->
  <rect x="40" y="40" width="1120" height="620" fill="none" stroke="#c9a84c" stroke-width="0.8" opacity="0.25"/>
  <rect x="50" y="50" width="1100" height="600" fill="none" stroke="#c9a84c" stroke-width="0.3" opacity="0.15"/>

  <!-- Corner ornaments -->
  <g opacity="0.6">
    <path d="M40 40 L40 90 M40 40 L90 40" stroke="#c9a84c" stroke-width="1.5" fill="none"/>
    <path d="M1160 40 L1160 90 M1160 40 L1110 40" stroke="#c9a84c" stroke-width="1.5" fill="none"/>
    <path d="M40 660 L40 610 M40 660 L90 660" stroke="#c9a84c" stroke-width="1.5" fill="none"/>
    <path d="M1160 660 L1160 610 M1160 660 L1110 660" stroke="#c9a84c" stroke-width="1.5" fill="none"/>
  </g>

  <!-- Couple silhouette - man -->
  <g transform="translate(520, 150)" opacity="0.55">
    <!-- Body -->
    <ellipse cx="0" cy="60" rx="38" ry="55" fill="#c9a84c" opacity="0.4"/>
    <!-- Head -->
    <circle cx="0" cy="-20" r="32" fill="#c9a84c" opacity="0.4"/>
    <!-- Suit jacket hint -->
    <path d="M-38 80 L-20 60 L0 75 L20 60 L38 80 L45 200 L-45 200 Z" fill="#0f0c06" opacity="0.6"/>
    <path d="M-15 60 L0 75 L15 60 L10 200 L-10 200 Z" fill="#c9a84c" opacity="0.15"/>
  </g>

  <!-- Couple silhouette - woman -->
  <g transform="translate(680, 150)" opacity="0.55">
    <!-- Dress -->
    <path d="M0 100 C-55 110 -70 180 -60 300 L60 300 C70 180 55 110 0 100 Z" fill="#c9a84c" opacity="0.35"/>
    <!-- Body -->
    <ellipse cx="0" cy="65" rx="30" ry="45" fill="#c9a84c" opacity="0.4"/>
    <!-- Head -->
    <circle cx="0" cy="-15" r="28" fill="#c9a84c" opacity="0.4"/>
    <!-- Hair hint -->
    <path d="M-28 -25 Q-20 -65 0 -55 Q20 -65 28 -25" fill="#c9a84c" opacity="0.3"/>
  </g>

  <!-- Central glow behind couple -->
  <ellipse cx="600" cy="400" rx="200" ry="180" fill="#c9a84c" opacity="0.04"/>

  <!-- Ornamental divider top -->
  <g transform="translate(600, 120)">
    <line x1="-180" y1="0" x2="-20" y2="0" stroke="#c9a84c" stroke-width="0.6" opacity="0.4"/>
    <line x1="20" y1="0" x2="180" y2="0" stroke="#c9a84c" stroke-width="0.6" opacity="0.4"/>
    <text x="0" y="5" text-anchor="middle" font-size="16" fill="#c9a84c" opacity="0.5" font-family="Georgia,serif">✞</text>
  </g>

  <!-- Names text -->
  <text x="600" y="530" text-anchor="middle" font-size="52" fill="#c9a84c" opacity="0.7" font-family="Georgia,serif" font-style="italic" font-weight="300" letter-spacing="2">Alan &amp; Kris</text>

  <!-- Date text -->
  <text x="600" y="580" text-anchor="middle" font-size="16" fill="#c9a84c" opacity="0.4" font-family="Georgia,serif" letter-spacing="8">JUMAT · 26 JUNI 2026</text>

  <!-- Ornamental line below names -->
  <line x1="480" y1="598" x2="720" y2="598" stroke="#c9a84c" stroke-width="0.6" opacity="0.3"/>

  <!-- Label -->
  <text x="600" y="648" text-anchor="middle" font-size="11" fill="#c9a84c" opacity="0.2" font-family="Georgia,serif" letter-spacing="6">FOTO HERO — GANTI DENGAN FOTO ASLI</text>
</svg>
